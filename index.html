<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Drive Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              drive: {
                blue: "#1a73e8",
                hover: "#1557b0",
                darkBg: "#121212",
                darkCard: "#1a1a1c",
                green: "#6ab265",
                greenHover: "#5a9c56",
              },
            },
          },
        },
      };
    </script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap");
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-50 text-gray-900 dark:bg-drive-darkBg dark:text-gray-100 min-h-screen transition-colors duration-300">
    <header class="sticky top-0 z-40 bg-white dark:bg-drive-darkCard border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
      <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="p-2 bg-blue-50 dark:bg-gray-800/50 rounded-lg">
            <i data-lucide="hard-drive" class="w-6 h-6 text-drive-blue"></i>
          </div>
          <h1 class="text-xl font-bold tracking-tight">DriveIndex</h1>
        </div>

        <div class="flex items-center gap-2">
          <button id="themeToggle" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors" title="Ubah Tema">
            <i id="themeIcon" data-lucide="moon" class="w-5 h-5"></i>
          </button>

          <button onclick="openModal()" class="hidden sm:flex items-center gap-2 bg-drive-blue hover:bg-drive-hover text-white px-4 py-2 rounded-xl font-medium transition-colors">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span>Tambah Tautan</span>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 pb-24">
      <div class="mb-8 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
        <div>
          <h2 class="text-xl font-bold">Daftar Tautan</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">
            Kelola dan akses tautan Anda dengan cepat.
          </p>
        </div>

        <div class="relative w-full sm:w-72">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="searchInput" oninput="renderItems()" placeholder="Cari nama akun/tautan..." class="w-full pl-9 pr-4 py-2 bg-white dark:bg-[#202022] border border-gray-200 dark:border-gray-800 rounded-xl text-sm focus:outline-none focus:border-drive-blue" />
        </div>
      </div>

      <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center">
        <div class="w-16 h-16 bg-gray-100 dark:bg-drive-darkCard text-gray-400 rounded-2xl flex items-center justify-center mb-4">
          <i data-lucide="link-2-off" class="w-8 h-8"></i>
        </div>
        <h3 class="text-lg font-semibold">Belum ada tautan</h3>
        <p class="text-gray-500 text-sm mt-1">
          Tambahkan tautan pertama Anda untuk mulai mengelola.
        </p>
      </div>

      <div id="itemsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <button onclick="openModal()" class="sm:hidden fixed bottom-6 right-6 z-40 bg-drive-blue text-white p-4 rounded-full shadow-lg">
      <i data-lucide="plus" class="w-6 h-6"></i>
    </button>

    <div id="itemModal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-200 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
      <div class="bg-white dark:bg-[#1f1f22] w-full max-w-md rounded-2xl p-6 shadow-xl transform scale-95 transition-transform duration-200 h-max max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-5">
          <h3 id="modalTitle" class="text-lg font-bold">Tambah Tautan Baru</h3>
          <button onclick="closeModal()" class="p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>

        <form id="itemForm" onsubmit="saveItem(event)" class="space-y-4">
          <input type="hidden" id="editIndex" value="" />

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Nama Akun / Folder</label>
            <input type="text" id="itemName" required placeholder="Contoh: Manage Account" class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#141414] border border-gray-200 dark:border-gray-800 rounded-xl text-sm focus:outline-none focus:border-drive-blue focus:bg-white dark:focus:bg-[#1a1a1c]" />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Nama Gmail</label>
            <div class="flex rounded-xl bg-gray-50 dark:bg-[#141414] border border-gray-200 dark:border-gray-800 focus-within:border-drive-blue focus-within:bg-white dark:focus-within:bg-[#1a1a1c] overflow-hidden">
              <input type="text" id="itemGmail" required placeholder="Contoh: fajar.ramadhan" class="w-full px-3.5 py-2.5 bg-transparent text-sm focus:outline-none text-gray-900 dark:text-gray-100" />
              <span class="flex items-center px-3.5 text-sm text-gray-400 bg-gray-100 dark:bg-gray-800 select-none border-l border-gray-200 dark:border-gray-700">@gmail.com</span>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Link Google Drive</label>
            <input type="url" id="itemLink" required placeholder="https://docs.google.com/..." class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#141414] border border-gray-200 dark:border-gray-800 rounded-xl text-sm focus:outline-none focus:border-drive-blue focus:bg-white dark:focus:bg-[#1a1a1c]" />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1.5">Link API Kapasitas (Opsional)</label>
            <input type="url" id="itemApiUrl" placeholder="https://script.google.com/macros/s/.../exec" class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#141414] border border-gray-200 dark:border-gray-800 rounded-xl text-sm focus:outline-none focus:border-drive-blue focus:bg-white dark:focus:bg-[#1a1a1c]" />
          </div>

          <div class="flex items-center justify-between py-2 border-t border-gray-100 dark:border-gray-800 pt-4">
            <label class="text-xs font-semibold text-gray-500 uppercase">Tandai Sebagai Full</label>
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="itemIsFull" class="sr-only peer" />
              <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-red-500"></div>
            </label>
          </div>

          <div class="flex gap-3 pt-2">
            <button type="button" onclick="closeModal()" class="w-1/2 py-2.5 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">Batal</button>
            <button type="submit" class="w-1/2 py-2.5 bg-drive-blue hover:bg-drive-hover text-white rounded-xl text-sm font-medium transition-colors">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const GAS_URL = "https://script.google.com/macros/s/AKfycbwHKucIoORvaEyYVScmFejyNAjZg77VKVWcBXjFPu_sr4ZZJbSPgBQ-nmal9cR1KD6BUw/exec";
      const urlParams = new URLSearchParams(window.location.search);
      const AUTH_KEY = urlParams.get("key");
      let items = [];

      window.addEventListener("DOMContentLoaded", () => {
        initTheme();

        if (!AUTH_KEY) {
          document.getElementById("itemsGrid").innerHTML = `
            <div class="col-span-full text-center py-10 text-red-500 font-bold bg-red-50 dark:bg-red-900/20 rounded-xl">
              Akses Ditolak. Silakan gunakan tautan akses yang valid beserta parameternya.
            </div>`;
          document.querySelectorAll('button[onclick="openModal()"]').forEach((btn) => (btn.style.display = "none"));
          return;
        }

        fetchItems();
      });

      function initTheme() {
        const themeToggleBtn = document.getElementById("themeToggle");
        const isDark =
          localStorage.getItem("theme") === "dark" ||
          (!("theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches);

        if (isDark) document.documentElement.classList.add("dark");

        updateThemeIcon(isDark);

        themeToggleBtn.addEventListener("click", () => {
          const willBeDark = !document.documentElement.classList.contains("dark");
          if (willBeDark) {
            document.documentElement.classList.add("dark");
            localStorage.setItem("theme", "dark");
          } else {
            document.documentElement.classList.remove("dark");
            localStorage.setItem("theme", "light");
          }
          updateThemeIcon(willBeDark);
        });
      }

      function updateThemeIcon(isDark) {
        document.getElementById("themeIcon").setAttribute("data-lucide", isDark ? "sun" : "moon");
        lucide.createIcons();
      }

      async function sendDataToGAS(action, data = {}) {
        try {
          const response = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
              key: AUTH_KEY,
              action: action,
              data: data,
            }),
          });

          const result = await response.json();

          if (result.status === "error") {
            alert("Error: " + result.message);
            throw new Error(result.message);
          }

          return result;
        } catch (error) {
          console.error("Fetch error:", error);
          alert("Terjadi kesalahan jaringan atau akses ditolak.");
          return null;
        }
      }

      async function fetchItems() {
        const grid = document.getElementById("itemsGrid");
        grid.innerHTML = `
          <div class="col-span-full flex justify-center py-10">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-drive-blue"></div>
          </div>`;

        const result = await sendDataToGAS("read");

        if (result && result.data) {
          items = result.data;
          renderItems();
        } else {
          grid.innerHTML = "";
        }
      }

      async function saveItem(event) {
        event.preventDefault();

        const btnSubmit = event.target.querySelector('button[type="submit"]');
        const originalText = btnSubmit.innerText;

        btnSubmit.innerText = "Menyimpan...";
        btnSubmit.disabled = true;

        const id = document.getElementById("editIndex").value;
        const name = document.getElementById("itemName").value.trim();
        const gmail = document.getElementById("itemGmail").value.trim();
        const link = document.getElementById("itemLink").value.trim();
        const api_url = document.getElementById("itemApiUrl").value.trim();
        const is_full = document.getElementById("itemIsFull").checked;

        if (id === "") {
          const res = await sendDataToGAS("create", { name, gmail, link, is_full, api_url });
          if (res) {
            items.push({ id: res.id, name, gmail, link, is_full, api_url });
          }
        } else {
          const res = await sendDataToGAS("update", { id, name, gmail, link, is_full, api_url });
          if (res) {
            const index = items.findIndex((item) => item.id.toString() === id.toString());
            if (index > -1) {
              items[index] = { id, name, gmail, link, is_full, api_url };
            }
          }
        }

        btnSubmit.innerText = originalText;
        btnSubmit.disabled = false;

        renderItems();
        closeModal();
      }

      async function deleteItem(id) {
        if (confirm("Apakah Anda yakin ingin menghapus tautan ini?")) {
          const res = await sendDataToGAS("delete", { id: id });
          if (res) {
            items = items.filter((item) => item.id.toString() !== id.toString());
            renderItems();
          }
        }
      }

      function renderItems() {
        const grid = document.getElementById("itemsGrid");
        const emptyState = document.getElementById("emptyState");
        const searchQuery = document.getElementById("searchInput").value.toLowerCase();

        let filteredItems = items.filter((item) =>
          item.name.toLowerCase().includes(searchQuery)
        );

        if (filteredItems.length === 0) {
          grid.innerHTML = "";
          emptyState.classList.remove("hidden");
          return;
        }

        emptyState.classList.add("hidden");

        filteredItems.sort((a, b) => {
          const aFull = a.is_full === true || a.is_full === "true" ? 1 : 0;
          const bFull = b.is_full === true || b.is_full === "true" ? 1 : 0;
          return aFull - bFull;
        });

        grid.innerHTML = filteredItems
          .map((item) => {
            const isFull = item.is_full === true || item.is_full === "true";
            return `
              <div class="bg-white dark:bg-drive-darkCard border ${isFull ? "border-red-200 dark:border-red-900/30 bg-red-50/10" : "border-gray-100 dark:border-gray-800/50"} rounded-2xl p-5 flex flex-col justify-center shadow-sm hover:shadow-md transition-all relative group">
                
                ${isFull ? `<div class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-tr-2xl rounded-bl-xl uppercase tracking-wider shadow-sm">Full</div>` : ""}
                
                <div class="flex items-center justify-between w-full">
                  <div class="flex items-center gap-4 min-w-0 flex-1 pr-3">
                    <div class="shrink-0 ${isFull ? "text-red-400" : "text-blue-500"}">
                      <i data-lucide="${isFull ? "alert-triangle" : "link"}" class="w-6 h-6 stroke-[2.5]"></i>
                    </div>
                    <div class="min-w-0 flex-1">
                      <h4 class="font-bold text-gray-900 dark:text-gray-100 truncate text-base ${isFull ? "pr-8" : ""}" title="${escapeHtml(item.name)}">
                        ${escapeHtml(item.name)}
                      </h4>
                      <p class="text-xs text-gray-400 dark:text-gray-500 truncate mt-1" title="${escapeHtml(item.gmail)}@gmail.com">
                        ${escapeHtml(item.gmail)}@gmail.com
                      </p>
                    </div>
                  </div>

                  <div class="flex items-center gap-2 shrink-0">
                    <a href="${escapeHtml(item.link)}" target="_blank" class="px-6 py-2.5 ${isFull ? "bg-gray-400 dark:bg-gray-700" : "bg-drive-green hover:bg-drive-greenHover"} text-white rounded-full text-sm font-semibold transition-colors shadow-sm">
                      Open
                    </a>
                    <div class="relative shrink-0">
                      <button onclick="toggleDropdown(event, '${item.id}')" class="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 rounded-full transition-colors flex items-center justify-center">
                        <i data-lucide="more-vertical" class="w-6 h-6"></i>
                      </button>
                      <div id="dropdown-${item.id}" class="hidden absolute right-2 mt-2 w-32 bg-white dark:bg-[#202022] rounded-xl shadow-xl z-30 py-2 border border-gray-100 dark:border-gray-800">
                        <button onclick="openEditModal('${item.id}')" class="w-full px-4 py-2.5 text-left text-sm text-gray-800 dark:text-gray-100 font-medium hover:bg-gray-50 dark:hover:bg-[#2c2c2f] transition-colors">Edit</button>
                        <button onclick="deleteItem('${item.id}')" class="w-full px-4 py-2.5 text-left text-sm text-red-500 font-medium hover:bg-red-50 dark:hover:bg-[#2c2c2f] transition-colors">Delete</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="mt-4 w-full">
                  <div class="flex justify-between text-[10px] text-gray-500 dark:text-gray-400 mb-1.5">
                    <span id="text-used-${item.id}">Loading...</span>
                    <span id="text-percent-${item.id}">0%</span>
                  </div>
                  <div class="w-full bg-gray-100 dark:bg-gray-800 rounded-full h-1.5 overflow-hidden">
                    <div id="bar-${item.id}" class="bg-drive-blue h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                  </div>
                </div>

              </div>
            `;
          })
          .join("");

        lucide.createIcons();

        filteredItems.forEach((item) => {
          if (item.api_url && item.api_url.trim() !== "") {
            checkCapacity(item.id, item.api_url);
          } else {
            const usedText = document.getElementById(`text-used-${item.id}`);
            if (usedText) usedText.innerText = "API Kapasitas Belum Diatur";
          }
        });
      }

      function toggleDropdown(event, id) {
        event.stopPropagation();
        const target = document.getElementById(`dropdown-${id}`);
        document.querySelectorAll('[id^="dropdown-"]').forEach((dp) => {
          if (dp !== target) dp.classList.add("hidden");
        });
        target.classList.toggle("hidden");
      }

      document.addEventListener("click", () => {
        document.querySelectorAll('[id^="dropdown-"]').forEach((dp) => dp.classList.add("hidden"));
      });

      function openModal() {
        const modal = document.getElementById("itemModal");
        document.getElementById("modalTitle").innerText = "Tambah Tautan Baru";
        document.getElementById("itemForm").reset();
        document.getElementById("editIndex").value = "";
        document.getElementById("itemIsFull").checked = false;
        document.getElementById("itemApiUrl").value = "";

        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          modal.firstElementChild.classList.remove("scale-95");
          modal.firstElementChild.classList.add("scale-100");
        }, 10);
      }

      function openEditModal(id) {
        const item = items.find((i) => i.id.toString() === id.toString());
        if (!item) return;

        const modal = document.getElementById("itemModal");
        document.getElementById("modalTitle").innerText = "Ubah Tautan";
        document.getElementById("editIndex").value = item.id;
        document.getElementById("itemName").value = item.name;
        document.getElementById("itemGmail").value = item.gmail;
        document.getElementById("itemLink").value = item.link;
        document.getElementById("itemApiUrl").value = item.api_url || "";
        document.getElementById("itemIsFull").checked = item.is_full === true || item.is_full === "true";

        modal.classList.remove("hidden");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          modal.firstElementChild.classList.remove("scale-95");
          modal.firstElementChild.classList.add("scale-100");
        }, 10);
      }

      function closeModal() {
        const modal = document.getElementById("itemModal");
        modal.classList.add("opacity-0");
        modal.firstElementChild.classList.remove("scale-100");
        modal.firstElementChild.classList.add("scale-95");
        setTimeout(() => modal.classList.add("hidden"), 200);
      }

      function escapeHtml(text) {
        if (!text) return "";
        const map = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        };
        return text.toString().replace(/[&<>"']/g, (m) => map[m]);
      }

      async function checkCapacity(id, apiUrl) {
        try {
          const response = await fetch(apiUrl);
          const data = await response.json();
          
          if (data.status === "success") {
            const bar = document.getElementById(`bar-${id}`);
            const textUsed = document.getElementById(`text-used-${id}`);
            const textPercent = document.getElementById(`text-percent-${id}`);
            
            if (bar && textUsed && textPercent) {
              bar.style.width = `${data.percentage}%`;
              textPercent.innerText = `${data.percentage}%`;
              textUsed.innerText = `${data.used_gb} GB / ${data.total_gb} GB`;

              if (parseFloat(data.percentage) > 90) {
                bar.classList.remove('bg-drive-blue');
                bar.classList.add('bg-red-500');
              }
            }
          }
        } catch (error) {
          const textUsed = document.getElementById(`text-used-${id}`);
          if(textUsed) textUsed.innerText = "Gagal memuat kapasitas";
          console.error("Gagal mengambil data dari:", apiUrl);
        }
      }
    </script>
  </body>
</html>
