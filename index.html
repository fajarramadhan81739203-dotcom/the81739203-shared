<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        drive: {
                            blue: '#1a73e8',
                            hover: '#1557b0',
                            darkBg: '#121212',
                            darkCard: '#1a1a1c',
                            green: '#6ab265',
                            greenHover: '#5a9c56'
                        }
                    }
                }
            }
        }
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwHKucIoORvaEyYVScmFejyNAjZg77VKVWcBXjFPu_sr4ZZJbSPgBQ-nmal9cR1KD6BUw/exec";
        
        const urlParams = new URLSearchParams(window.location.search);
        const AUTH_KEY = urlParams.get('key');

        let items = [];

        window.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            if (!AUTH_KEY) {
                document.getElementById('itemsGrid').innerHTML = `
                    <div class="col-span-full text-center py-10 text-red-500 font-bold bg-red-50 dark:bg-red-900/20 rounded-xl">
                        Akses Ditolak. Silakan gunakan tautan akses yang valid beserta parameternya.
                    </div>`;
                document.querySelectorAll('button[onclick="openModal()"]').forEach(btn => btn.style.display = 'none');
                return;
            }
            
            fetchItems();
        });

        function initTheme() {
            const themeToggleBtn = document.getElementById('themeToggle');
            const isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            
            if (isDark) document.documentElement.classList.add('dark');
            updateThemeIcon(isDark);

            themeToggleBtn.addEventListener('click', () => {
                const willBeDark = !document.documentElement.classList.contains('dark');
                if (willBeDark) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
                updateThemeIcon(willBeDark);
            });
        }

        function updateThemeIcon(isDark) {
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        async function sendDataToGAS(action, data = {}) {
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                    body: JSON.stringify({
                        key: AUTH_KEY,
                        action: action,
                        data: data
                    })
                });
                const result = await response.json();
                
                if (result.status === "error") {
                    alert("Error: " + result.message);
                    throw new Error(result.message);
                }
                return result;
            } catch (error) {
                console.error("Fetch error:", error);
                alert("Terjadi kesalahan jaringan atau akses ditolak.");
                return null;
            }
        }

        async function fetchItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = `
                <div class="col-span-full flex justify-center py-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-drive-blue"></div>
                </div>`;
            
            const result = await sendDataToGAS('read');
            if (result && result.data) {
                items = result.data;
                renderItems();
            } else {
                grid.innerHTML = '';
            }
        }

        async function saveItem(event) {
            event.preventDefault();
            const btnSubmit = event.target.querySelector('button[type="submit"]');
            const originalText = btnSubmit.innerText;
            btnSubmit.innerText = "Menyimpan...";
            btnSubmit.disabled = true;

            const id = document.getElementById('editIndex').value;
            const name = document.getElementById('itemName').value.trim();
            const gmail = document.getElementById('itemGmail').value.trim();
            const link = document.getElementById('itemLink').value.trim();
            const is_full = document.getElementById('itemIsFull').checked;

            if (id === '') {
                const res = await sendDataToGAS('create', { name, gmail, link, is_full });
                if (res) {
                    items.push({ id: res.id, name, gmail, link, is_full });
                }
            } else {
                const res = await sendDataToGAS('update', { id, name, gmail, link, is_full });
                if (res) {
                    // Mencegah error tipe data dengan metode String()
                    const index = items.findIndex(item => item && item.id && String(item.id) === String(id));
                    if (index > -1) {
                        items[index] = { id, name, gmail, link, is_full };
                    }
                }
            }

            btnSubmit.innerText = originalText;
            btnSubmit.disabled = false;
            renderItems();
            closeModal();
        }

        async function deleteItem(id) {
            if (confirm('Apakah Anda yakin ingin menghapus tautan ini?')) {
                const res = await sendDataToGAS('delete', { id: id });
                if (res) {
                    // Mencegah error tipe data dengan metode String()
                    items = items.filter(item => item && item.id && String(item.id) !== String(id));
                    renderItems();
                }
            }
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredItems = items.filter(item => (item.name || '').toLowerCase().includes(searchQuery));

            if (filteredItems.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            
            // Urutkan data: Link aktif di atas, Link 'Full' ditaruh paling bawah
            filteredItems.sort((a, b) => {
                const aFull = a.is_full === true || a.is_full === 'true' ? 1 : 0;
                const bFull = b.is_full === true || b.is_full === 'true' ? 1 : 0;
                return aFull - bFull;
            });
            
            grid.innerHTML = filteredItems.map((item) => {
                const isFull = item.is_full === true || item.is_full === 'true';
                // Amankan parameter ID saat dipassing ke HTML
                const safeId = escapeHtml(item.id || '');
                
                return `
                    <div class="bg-white dark:bg-drive-darkCard border ${isFull ? 'border-red-200 dark:border-red-900/30 bg-red-50/10' : 'border-gray-100 dark:border-gray-800/50'} rounded-2xl pl-5 pr-2 py-4 flex items-center justify-between shadow-sm hover:shadow-md transition-all relative group">
                        
                        ${isFull ? `
                            <div class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-2.5 py-1 rounded-tr-2xl rounded-bl-xl uppercase tracking-wider shadow-sm">
                                Full
                            </div>
                        ` : ''}

                        <div class="flex items-center gap-4 min-w-0 flex-1 pr-3">
                            <div class="shrink-0 ${isFull ? 'text-red-400' : 'text-blue-500'}">
                                <i data-lucide="${isFull ? 'alert-triangle' : 'link'}" class="w-6 h-6 stroke-[2.5]"></i>
                            </div>
                            
                            <div class="min-w-0 flex-1">
                                <h4 class="font-bold text-gray-900 dark:text-gray-100 truncate text-base ${isFull ? 'pr-8' : ''}" title="${escapeHtml(item.name || '')}">
                                    ${escapeHtml(item.name || '')}
                               </h4>
                                <p class="text-xs text-gray-400 dark:text-gray-500 truncate mt-1 flex items-center gap-1" title="${escapeHtml(item.gmail || '')}@gmail.com">
                                    <i data-lucide="mail" class="w-3 h-3 inline"></i>
                                    <span>${escapeHtml(item.gmail || '')}@gmail.com</span>
                                </p>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 shrink-0">
                            <a href="${escapeHtml(item.link || '#')}" target="_blank" class="px-6 py-2.5 ${isFull ? 'bg-gray-400 dark:bg-gray-700' : 'bg-drive-green hover:bg-drive-greenHover'} text-white rounded-full text-sm font-semibold transition-colors shadow-sm">
                                Open
                            </a>

                            <div class="relative shrink-0">
                                <button onclick="toggleDropdown(event, '${safeId}')" class="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 rounded-full transition-colors flex items-center justify-center">
                                    <i data-lucide="more-vertical" class="w-6 h-6"></i>
                                </button>
                                
                                <div id="dropdown-${safeId}" class="hidden absolute right-2 mt-2 w-32 bg-white dark:bg-[#202022] rounded-xl shadow-xl z-30 py-2 border border-gray-100 dark:border-gray-800">
                                    <button onclick="openEditModal('${safeId}')" class="w-full px-4 py-2.5 text-left text-sm text-gray-800 dark:text-gray-100 font-medium hover:bg-gray-50 dark:hover:bg-[#2c2c2f] transition-colors">
                                        Edit
                                    </button>
                                    <button onclick="deleteItem('${safeId}')" class="w-full px-4 py-2.5 text-left text-sm text-red-500 font-medium hover:bg-red-50 dark:hover:bg-[#2c2c2f] transition-colors">
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        function toggleDropdown(event, id) {
            event.stopPropagation();
            const target = document.getElementById(`dropdown-${id}`);
            document.querySelectorAll('[id^="dropdown-"]').forEach(dp => {
                if(dp !== target && dp) dp.classList.add('hidden');
            });
            if(target) target.classList.toggle('hidden');
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('[id^="dropdown-"]').forEach(dp => dp.classList.add('hidden'));
        });

        function openModal() {
            const modal = document.getElementById('itemModal');
            document.getElementById('modalTitle').innerText = 'Tambah Tautan Baru';
            document.getElementById('itemForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('itemIsFull').checked = false;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 10);
        }

        function openEditModal(id) {
            // Pencarian yang kebal error
            const item = items.find(i => i && i.id && String(i.id) === String(id));
            
            if (!item) {
                alert("Terjadi kesalahan: Data tidak dapat ditarik. Silakan segarkan (refresh) halaman.");
                return;
            }

            const modal = document.getElementById('itemModal');
            document.getElementById('modalTitle').innerText = 'Ubah Tautan';
            document.getElementById('editIndex').value = item.id;
            
            // Menggunakan || '' untuk mengisi form walau datanya kosong di Google Sheets
            document.getElementById('itemName').value = item.name || '';
            document.getElementById('itemGmail').value = item.gmail || '';
            document.getElementById('itemLink').value = item.link || '';
            document.getElementById('itemIsFull').checked = item.is_full === true || item.is_full === 'true';

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.firstElementChild.classList.remove('scale-95');
                modal.firstElementChild.classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('itemModal');
            modal.classList.add('opacity-0');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        function escapeHtml(text) {
            if(!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.toString().replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</html>
